# Zusaetzliche Arm-Controller fuer den UR5 (a200-0553), die Clearpath NICHT
# generiert. Werden per arm_controllers.launch.py mit dem controller_manager-spawner
# in den BESTEHENDEN manipulators-controller_manager geladen:
#   - Broadcaster -> AKTIV (kollidieren nicht).
#   - Command-Controller (freedrive/forward/passthrough) -> --inactive (beanspruchen
#     dieselben Command-Interfaces wie arm_0_joint_trajectory_controller -> wuerden
#     aktiv kollidieren). Per ur_controller_mode_manager zur Laufzeit umschaltbar.
#
# Params 1:1 aus ur_robot_driver/config/ur_controllers.yaml uebernommen, mit
# tf_prefix 'arm_0_' (statt $(var tf_prefix)). Der File wird dem spawner per
# --param-file uebergeben. WICHTIG (Jazzy-Format): jeder Controller als
# '/**/<name>'-Wildcard-Node, und der 'type' steht MIT in dessen 'ros__parameters'
# (NICHT als separate controller_manager-Section mit FQN -> so zieht der Spawner
# Typ + Params korrekt; FQN/CM-Section wurde NICHT uebernommen -> "Failed loading").

# ---- Broadcaster-Params & Types --------------------------------------------
/**/force_torque_sensor_broadcaster:
  ros__parameters:
    type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster
    sensor_name: arm_0_tcp_fts_sensor
    state_interface_names:
      - force.x
      - force.y
      - force.z
      - torque.x
      - torque.y
      - torque.z
    frame_id: arm_0_tool0
    topic_name: ft_data

/**/tcp_pose_broadcaster:
  ros__parameters:
    type: pose_broadcaster/PoseBroadcaster
    frame_id: arm_0_base
    pose_name: arm_0_tcp_pose
    tf:
      child_frame_id: arm_0_tool0_controller

/**/speed_scaling_state_broadcaster:
  ros__parameters:
    type: ur_controllers/SpeedScalingStateBroadcaster
    state_publish_rate: 100.0
    tf_prefix: arm_0_

# ---- Command-Controller-Params & Types -------------------------------------
/**/forward_position_controller:
  ros__parameters:
    type: position_controllers/JointGroupPositionController
    joints:
      - arm_0_shoulder_pan_joint
      - arm_0_shoulder_lift_joint
      - arm_0_elbow_joint
      - arm_0_wrist_1_joint
      - arm_0_wrist_2_joint
      - arm_0_wrist_3_joint

/**/forward_velocity_controller:
  ros__parameters:
    type: velocity_controllers/JointGroupVelocityController
    joints:
      - arm_0_shoulder_pan_joint
      - arm_0_shoulder_lift_joint
      - arm_0_elbow_joint
      - arm_0_wrist_1_joint
      - arm_0_wrist_2_joint
      - arm_0_wrist_3_joint
    interface_name: velocity

/**/freedrive_mode_controller:
  ros__parameters:
    type: ur_controllers/FreedriveModeController
    tf_prefix: arm_0_

/**/passthrough_trajectory_controller:
  ros__parameters:
    type: ur_controllers/PassthroughTrajectoryController
    tf_prefix: arm_0_
    joints:
      - arm_0_shoulder_pan_joint
      - arm_0_shoulder_lift_joint
      - arm_0_elbow_joint
      - arm_0_wrist_1_joint
      - arm_0_wrist_2_joint
      - arm_0_wrist_3_joint
    state_interfaces:
      - position
      - velocity
    speed_scaling_interface_name: arm_0_speed_scaling/speed_scaling_factor
